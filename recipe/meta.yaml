{% set name = "sparkflow" %}
{% set version = "0.7.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sparkflow-{{ version }}.tar.gz
  sha256: 532e5055f6d21333460b5162dfddbe8d53408eaca95d89d0654d6a95e6b2cb57

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - dill
    - flask
    - protobuf
    - python >={{ python_min }}
    - requests
    - tensorflow

test:
  imports:
    - examples
    - sparkflow
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/lifeomic/sparkflow
  summary: Deep learning on Spark with Tensorflow
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - IlanaRadinsky
